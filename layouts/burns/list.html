{{ define "main" }}
{{ $all_comics := .Pages.ByDate }}
{{ if gt (len $all_comics) 0 }}
  {{ $latest := index $all_comics (sub (len $all_comics) 1) }}
  <script>window.location.href = "{{ $latest.RelPermalink }}";</script>
{{ end }}

<h1>Archive</h1>
<ul style="list-style: none; padding: 0;">
  {{ range .Pages.ByDate.Reverse }}
    <li style="margin: 10px 0;">
      <a href="{{ .RelPermalink }}">{{ .Date.Format "2006-01-02" }} - {{ .Title }}</a>
    </li>
  {{ end }}
</ul>
{{ end }}
